<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #07101f;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
  }
  .sidebar {
    width: 180px;
    min-width: 180px;
    background: rgba(255,255,255,0.03);
    border-right: 1px solid rgba(255,255,255,0.08);
    padding: 16px 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .sidebar-title {
    color: #64748b;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 12px 6px;
    margin-top: 8px;
  }
  .sidebar-title:first-child { margin-top: 0; }
  .nav-btn {
    background: transparent;
    border: none;
    padding: 8px 12px;
    color: #94a3b8;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }
  .nav-btn:hover {
    background: rgba(255,255,255,0.05);
    color: #e2e8f0;
  }
  .nav-btn.active {
    background: rgba(59, 130, 246, 0.15);
    border-left-color: #3b82f6;
    color: #ffffff;
  }
  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
    overflow-x: auto;
  }
  #chart { width: 100%; max-width: 1400px; text-align: center; }
  svg { overflow: visible; display: block; width: 100%; }
  .link {
    fill: none;
    stroke-opacity: 0.35;
    transition: stroke-opacity 0.18s;
    cursor: pointer;
  }
  .link:hover { stroke-opacity: 0.7; }
  .node-rect {
    cursor: pointer;
    transition: opacity 0.18s;
  }
  .node-rect:hover { opacity: 1 !important; }
  #tooltip {
    position: fixed;
    background: rgba(8,16,31,0.97);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 14px;
    color: #f1f5f9;
    font-size: 13px;
    pointer-events: none;
    display: none;
    z-index: 999;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    white-space: nowrap;
  }
  #tooltip .tip-label { font-weight: 700; margin-bottom: 3px; }
  #tooltip .tip-val { color: #94a3b8; }
</style>

function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1)+"M";
  if (n >= 1000) return (n/1000).toFixed(1)+"k";
  return n.toLocaleString();
}

// TOOLTIP HELPERS
// ══════════════════════════════════════════════════════════════════════════════
const tip = document.getElementById("tooltip");
const tipLabel = document.getElementById("tip-label");
const tipVal = document.getElementById("tip-val");

let currentTotal = 0;

function showTip(event, label, val) {
  tipLabel.textContent = label;
  const pct = currentTotal > 0 ? ((val / currentTotal) * 100).toFixed(1) + "%" : "";
  tipVal.textContent = fmt(val) + " tickets" + (pct ? " (" + pct + ")" : "");
  tip.style.display = "block";
  moveTip(event);
}
function moveTip(event) {
  tip.style.left = (event.clientX + 14) + "px";
  tip.style.top = (event.clientY - 38) + "px";
}
function hideTip() { tip.style.display = "none"; }

// VERSION SWITCHING
// ══════════════════════════════════════════════════════════════════════════════
let currentVersion = 'all-ecm';

function showVersion(version) {
  currentVersion = version;
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${version}'`));
  });

  d3.select("#chart").selectAll("*").remove();

  switch(version) {
    case 'all-ecm': renderECM(dataAllECM, "All Brands"); break;
    case 'all-cbi': renderCBI(dataAllCBI, "All Brands"); break;
    case 'sgsgo-ecm': renderECM(dataSgSgoECM, "SeatGeek + SG Open"); break;
    case 'sgsgo-cbi': renderCBI(dataSgSgoCBI, "SeatGeek + SG Open"); break;
    case 'sg-ecm': renderECM(dataSgECM, "SeatGeek"); break;
    case 'sg-ci': renderCI(dataSgCI, "SeatGeek"); break;
    case 'sgo-ecm': renderECM(dataSgoECM, "SG Open"); break;
    case 'sgo-ci': renderCI(dataSgoCI, "SG Open"); break;
    case 'bx-ecm': renderECM(dataBxECM, "BX"); break;
    case 'bx-ci': renderCI(dataBxCI, "BX"); break;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// RENDER: Entry Point → Channel → Merge Status
// ══════════════════════════════════════════════════════════════════════════════
function renderECM(raw, brandName) {
  const nodeIndex = new Map();
  const nodes = [];
  const linkMap = new Map();

  function getNode(name, depth) {
    const key = `${depth}::${name}`;
    if (!nodeIndex.has(key)) {
      nodeIndex.set(key, nodes.length);
      nodes.push({ name, depth });
    }
    return nodeIndex.get(key);
  }

  function addLink(si, ti, v) {
    const k = `${si}->${ti}`;
    if (!linkMap.has(k)) linkMap.set(k, { source: si, target: ti, value: 0 });
    linkMap.get(k).value += v;
  }

  raw.forEach(([ep, ch, mg, v]) => {
